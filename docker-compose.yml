version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kafalah-db
    environment:
      POSTGRES_USER: kafalah_user
      POSTGRES_PASSWORD: kafalah_password
      POSTGRES_DB: kafalah_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # ملفات التهيئة ليتم تنفيذها عند إنشاء قاعدة البيانات أول مرة
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

volumes:
  postgres_data:
